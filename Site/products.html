<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products - BikeStores</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="SAE401" width="40" height="40" class="me-2">
                BikeStores
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto" id="menu"></ul>
                <span class="text-white me-3" id="userInfo"></span>
                <button class="btn btn-outline-light" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Products</h1>
            <button class="btn btn-primary" id="addProductBtn">Add Product</button>
        </div>
        <div class="row mb-3">
            <div class="col-md-3">
                <label for="filterName" class="form-label">Search by Name</label>
                <input type="text" id="filterName" class="form-control" placeholder="Type a product name...">
            </div>
            <div class="col-md-3">
                <label for="filterBrand" class="form-label">Brand</label>
                <select id="filterBrand" class="form-select">
                    <option value="">All Brands</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="filterCategory" class="form-label">Category</label>
                <select id="filterCategory" class="form-select">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="filterYear" class="form-label">Model Year</label>
                <select id="filterYear" class="form-select">
                    <option value="">All Years</option>
                </select>
            </div>
        </div>
        <div class="row mb-4">
            <div class="col-md-6">
                <label for="minPrice" class="form-label">Min Price</label>
                <input type="number" id="minPrice" class="form-control" placeholder="0">
            </div>
            <div class="col-md-6">
                <label for="maxPrice" class="form-label">Max Price</label>
                <input type="number" id="maxPrice" class="form-control" placeholder="10000">
            </div>
        </div>
        <div id="productsTable"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/products.js"></script>
</body>
</html>
